apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: argo-rollouts-demo
  labels:
    app: traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
        - name: traffic-generator
          image: traffic-generator:latest
          imagePullPolicy: Never
          env:
            - name: TARGET_URL
              value: "http://scores-api-stable:8080"
            - name: REQUESTS_PER_SECOND
              value: "3"
            - name: DURATION_SECONDS
              value: "0"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
